# Template config for DILI training using precomputed split CSVs
# Use this as a base and let the SLURM array script override the paths and hyperparameters.
seed: 42
dataloaders:
  _target_: training.build_dataloaders
  dataset:
    _target_: dataset.SupervisedGraphDataset
    data_path: /scratch/work/masooda1/datasets/downstream_datasets/DILI/DILI_Goldstandard_1111.csv
    invalid_smiles_report: /scratch/work/masooda1/datasets/downstream_datasets/DILI/invalid_smiles.csv
    cmpd_col: protonated_smiles_r
    label_col: TOXICITY
    cmpd_col_is_inchikey: false
    pad_length: 250
  split_method: murcko_sgkf  # ignored when splits are provided
  seed: 42
  batch_size: 32
  num_workers: 8
  pin_memory: true
  # These are the split CSVs generated by scripts/generate_splits.py
  # The array script will override these per job
  splits:
    train: 
    val: 

model:
  _target_: model.LightningGGNN.load_from_checkpoint
  _args_:
  - # Path to extracted molecular encoder checkpoint (set externally if needed)
  strict: false
  n_edge: 1
  in_dim: 75
  n_conv: 6
  fc_dims:
  - 1024
  - 128
  - 1
  p_dropout: 0.1
  freeze: false
  loss_type: BCE #focal or BCE
  focal_gamma: 1.0

optimizer:
  _target_: torch.optim.AdamW
  lr:            # overridden per array task
  weight_decay:      # overridden per array task

trainer:
  _target_: pytorch_lightning.Trainer
  devices: 1
  accelerator: gpu
  num_nodes: 1
  precision: 32
  max_epochs: 1000
  min_epochs: 10
  fast_dev_run: false
  check_val_every_n_epoch: 1
  enable_model_summary: false
  callbacks:
  - _target_: pytorch_lightning.callbacks.early_stopping.EarlyStopping
    monitor: val/loss
    mode: min
    patience: 100
    verbose: false
  - _target_: pytorch_lightning.callbacks.ModelCheckpoint
    monitor: val/loss
    mode: min
    save_top_k: 1
    save_last: true
    dirpath: # Will be set via command line
    filename: "best-epoch-{epoch}-val_loss-{val/loss:.3f}"
    auto_insert_metric_name: false
    verbose: false
  logger:
    _target_: pytorch_lightning.loggers.NeptuneLogger
    project: # Will be set via command line
    name: # Will be set via command line
    api_key: # Will be set via command line
    log_model_checkpoints: false

test_model:
  _target_: model.LightningGGNN.load_from_checkpoint
  checkpoint_path: # Will be set via command line
  n_edge: ${model.n_edge}
  in_dim: ${model.in_dim}
  n_conv: ${model.n_conv}
  fc_dims: ${model.fc_dims}
  p_dropout: ${model.p_dropout}

test_results_dir: # This will be overridden by the command line argument
test_results_filename: # This will be overridden by the command line argument
test_model_ckpt: # This can be overridden by the command line (manual checkpoint load)
# NOTE:
# - Keep your existing `model:` section from Downstream_DILIGold.yml.
#   If you prefer, copy it here verbatim, or use this file as a base that the
#   array script copies and modifies per run.

