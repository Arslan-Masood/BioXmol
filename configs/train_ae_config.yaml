# AE Training Configuration
# Standard Autoencoder (no KL divergence)

# Data parameters
data:
  data_path: "/scratch/work/masooda1/Multi_Modal_Contrastive/data/dummy_data/cell_fetures_with_smiles_2000.parquet"
  train_split: "/scratch/work/masooda1/Multi_Modal_Contrastive/data/dummy_data/jump-compound-split-0-train.csv"
  val_split: "/scratch/work/masooda1/Multi_Modal_Contrastive/data/dummy_data/jump-compound-split-0-val.csv"
  test_split: "/scratch/work/masooda1/Multi_Modal_Contrastive/data/dummy_data/jump-compound-split-0-val.csv"
  batch_size: 64
  num_workers: 4
  normalize: true    # Whether to normalize features

  # Specify which column contains molecular identifiers for filtering
  molecule_id_column: "Metadata_InChIKey"  # Column to use for molecule filtering
  
  # Exclude control molecules (InChIKeys)
  exclude_molecules: 
    - "IBCXZJCWDGCXQT-UHFFFAOYSA-N"  # 1593 duplicates
    - "IHLVSLOZUHKNMQ-UHFFFAOYSA-N"  # 5881 duplicates
    - "SRVFFFJZQVENJC-UHFFFAOYSA-N"  # 7059 duplicates
    - "CQKBSRPVZZLCJE-UHFFFAOYSA-N"  # 7443 duplicates
    - "KPBNHDGDUADAGP-UHFFFAOYSA-N"  # 7454 duplicates
    - "GJFCONYVAUNLKB-UHFFFAOYSA-N"  # 7459 duplicates
    - "LOUPRKONTZGTKE-UHFFFAOYSA-N"  # 7459 duplicates
    - "OINGHOPGNMYCAB-UHFFFAOYSA-N"  # 7461 duplicates
    - "IVUGFMLRJOCGAS-UHFFFAOYSA-N"  # 7469 duplicates
    - "IAZDPXIOMUYVGZ-UHFFFAOYSA-N"  # 79094 duplicates
# Model parameters
model:
  model_type: "ae"         # Autoencoder mode
  architecture: "medium"   # "vanilla", "medium", or "large"
  latent_dim: 128
  dropout: 0.0
  norm_type: "layernorm"          # "batchnorm", "layernorm", "none"
  beta: 1.0                       # Ignored for AE
  scheduler_type: "cosine"        # switch scheduler "plateau" or "cosine" or "cosine_with_warmup"
  T_max: 100                      # epochs in one cosine cycle
  eta_min: 0.00000001             # minimum LR at the trough
  warmup_epochs: 0                # epochs in cosine_with_warmup
# Optimization parameters
optimization:
  optimizer: "adamw"      # "adamw", "adam", "sgd"
  learning_rate: 0.001      # 1e-3 as decimal
  weight_decay: 0      # 1e-4 as decimal

# Training parameters
training:
  max_epochs: 2000
  patience: 1000
  gpus: 1
  precision: 32
  seed: 42
  fast_dev_run: false
  save_model_weights: false  # Set to false to disable model weight saving
# Logging parameters
logging:
  experiment_name: "jump_ae_vanilla"
  project_name: "jump-cell-painting"
  log_dir: "/scratch/work/masooda1/Multi_Modal_Contrastive/vae_logs"
  use_wandb: true 
  entity: "arslan_masood"