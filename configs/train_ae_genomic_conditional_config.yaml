# Conditional VAE Training Configuration for Genomic (LINCS L1000) Data
# This config trains a conditional autoencoder that accepts genomic features + cell line/dose/time embeddings
# This matches the input format expected by CellLineTripleInputEncoder

# Data parameters
data:
  modality: "genomic"  # Specify genomic modality
  genomic_data_path: "/scratch/work/masooda1/datasets/LINCS_preprocessed/landmark_cmp_data_min1000compounds_all_measurements.parquet"
  data_path: "/scratch/work/masooda1/datasets/LINCS_preprocessed/landmark_cmp_data_min1000compounds_all_measurements.parquet"  # Fallback path
  train_split: "/scratch/work/masooda1/datasets/LINCS_preprocessed/LINCS_splits/LINCS-compound-split-0-train.csv"
  val_split: "/scratch/work/masooda1/datasets/LINCS_preprocessed/LINCS_splits/LINCS-compound-split-0-val.csv"
  test_split: "/scratch/work/masooda1/datasets/LINCS_preprocessed/LINCS_splits/LINCS-compound-split-0-val.csv"
  batch_size: 1024   # Conditional data can be more complex
  num_workers: 4
  normalize: false    # Whether to normalize features
  target_cell_line: null  # Filter to specific cell line (e.g., "U2OS"), null for all

    
# Model parameters  
model:
  model_type: "ae"            # "vae" or "ae"
  architecture: "medium"      # "vanilla", "medium", or "large" - conditional models need more capacity
  latent_dim: 128            # Latent dimension
  dropout: 0.0              # Some dropout for conditional models
  norm_type: "batchnorm"     # "batchnorm", "layernorm", or "none"
  beta: 1.0                  # KL divergence weight (beta-VAE)
  scheduler_type: "cosine"   # Learning rate scheduler
  T_max: 100                 # Max epochs for cosine annealing
  eta_min: 0.00001           # Min learning rate for cosine annealing
  warmup_epochs: 15          # Number of warmup epochs
  
  # Conditional mode parameters
  conditional_mode: true     # Enable conditional mode
  cell_embedding_dim: 32     # Cell line embedding dimension
  dose_embedding_dim: 32     # Dose level embedding dimension
  time_embedding_dim: 32     # Time point embedding dimension

# Optimization parameters
optimization:
  learning_rate: 0.001       # Learning rate for conditional model
  weight_decay: 0.0000      # Weight decay

# Training parameters
training:
  max_epochs: 10100            # Conditional models may need more epochs
  patience: 1000              # Patience for early stopping
  gpus: 1
  precision: 32
  seed: 42
  fast_dev_run: false        # Set to true for debugging
  save_model_weights: true   # Set to true to save model checkpoints

# Logging parameters
logging:
  experiment_name: "genomic_conditional_ae_best"  # Will be used as-is
  project_name: "genomic-lincs-l1000-conditional"
  entity: arslan_masood                      # Your wandb entity/username
  log_dir: "/scratch/work/masooda1/Multi_Modal_Contrastive/vae_logs_lincs_conditional"
  use_wandb: true  # Set to true to enable wandb logging 
